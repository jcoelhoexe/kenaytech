<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kenay Tech - Ofertas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="logo">KENAY<span>TECH</span></div>
    <div class="search-bar">
      <input type="text" placeholder="Procurar produtos...">
    </div>
  </header>

  <div class="container-geral">
    <aside class="sidebar">
      <h3>LOCALIZADOR</h3>
      <ul>
        <li>Smartphone</li>
        <li>Smartwatch</li>
        <li>Notebook</li>
        <li>Fones</li>
      </ul>
      <div class="banner-sidebar">
        <p>Anúncio Mercado Livre</p>
      </div>
    </aside>

    <main>
      <section class="destaques">
        <div class="banner-principal">
          <h2>Top 5 Gadgets até R$200</h2>
        </div>
      </section>

      <h2 class="section-title">PRODUTOS EM OFERTA</h2>
      <section id="produtos" class="grid-produtos"></section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
